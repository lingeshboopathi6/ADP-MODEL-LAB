<!DOCTYPE html>
<html>
<head>
    <title>Background Example</title>
    <style>
        body {
            background-color: rgb(156, 208, 227);
        }

        .box {
            background-color: rgb(36, 52, 230);
            padding: 20px;
            margin: 20px;
        }

        .image-box {
            background-image: url("C:/Users/Lingesh66/OneDrive/Pictures/wallpaper pics/5825573.jpg");

    <div style="text-align: center;">

        gud night
    </div>

</body>
</html>
